<!DOCTYPE html>
<html>
<head>
<title>Bouncy Rainbow</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<style>

.top {
    width: 100%;
    height: 20px;
    background-color:  #ff0000 ;
    position: relative;
    animation-name: example;
    animation-duration: 1s;
    animation-iteration-count: 1000;
    margin: auto;

}

@keyframes example {
    0% {background-color: #ff0000 ; left:0px; top:0px;}
    50% {background-color: #ff0000 ; left:0px; top: 40px;}
    100% {background-color: #ff0000 ; left:0px; top:0px;}

}


.top2 {
    width: 100%;
    height: 20px;
    background-color:  #ffa500 ;
    position: relative;
    animation-name: example2;
    animation-duration: 1s;
    animation-iteration-count: 1000;
    margin: auto;

}

@keyframes example2 {
    0% {background-color: #ffa500 ; left:0px; top:0px;}
    50% {background-color: #ffa500 ; left:0px; top: 50px;}
    100% {background-color: #ffa500 ; left:0px; top:0px;}

}


.top3 {
    width: 100%;
    height: 20px;
    background-color:   #ffff00  ;
    position: relative;
    animation-name: example3;
    animation-duration: 1s;
    animation-iteration-count: 1000;
    margin: auto;

}

@keyframes example3 {
    0% {background-color:  #ffff00  ; left:0px; top:0px;}
    50% {background-color:  #ffff00  ; left:0px; top: 60px;}
    100% {background-color:  #ffff00  ; left:0px; top:0px;}

}


.top4 {
    width: 100%;
    height: 20px;
    background-color:    #008000   ;
    position: relative;
    animation-name: example4;
    animation-duration: 1s;
    animation-iteration-count: 1000;
    margin: auto;

}

@keyframes example4 {
    0% {background-color:   #008000   ; left:0px; top:0px;}
    50% {background-color:   #008000   ; left:0px; top: 70px;}
    100% {background-color:   #008000   ; left:0px; top:0px;}

}

.top5 {
    width: 100%;
    height: 20px;
    background-color:    #0000ff   ;
    position: relative;
    animation-name: example5;
    animation-duration: 1s;
    animation-iteration-count: 1000;
    margin: auto;

}

@keyframes example5 {
    0% {background-color:   #0000ff   ; left:0px; top:0px;}
    50% {background-color:   #0000ff   ; left:0px; top: 80px;}
    100% {background-color:   #0000ff   ; left:0px; top:0px;}

}

.top6 {
    width: 100%;
    height: 20px;
    background-color:    #4b0082   ;
    position: relative;
    animation-name: example6;
    animation-duration: 1s;
    animation-iteration-count: 1000;
    margin: auto;

}

@keyframes example6 {
    0% {background-color:   #4b0082   ; left:0px; top:0px;}
    50% {background-color:   #4b0082   ; left:0px; top: 90px;}
    100% {background-color:   #4b0082   ; left:0px; top:0px;}

}

.top7 {
    width: 100%;
    height: 20px;
    background-color:    #ee82ee   ;
    position: relative;
    animation-name: example7;
    animation-duration: 1s;
    animation-iteration-count: 1000;
    margin: auto;

}

@keyframes example7 {
    0% {background-color:   #ee82ee   ; left:0px; top:0px;}
    50% {background-color:   #ee82ee   ; left:0px; top: 100px;}
    100% {background-color:   #ee82ee  ; left:0px; top:0px;}

}












</style>

<body>


<div class="top" id="top">
<!-- div is empty for animation -->
</div>

<div class="top2" id="top2">
<!-- div is empty for animation -->
</div>

<div class="top3" id="top3">
<!-- div is empty for animation -->
</div>

<div class="top4" id="top4">
    <!-- div is empty for animation -->
    </div>

    <div class="top5" id="top5">
        <!-- div is empty for animation -->
        </div>

        <div class="top6" id="top6">
            <!-- div is empty for animation -->
            </div>

            <div class="top7" id="top7">
                <!-- div is empty for animation -->
                </div>


</body>
</html>
